name: 订阅邮件通知
description: 订阅套利指标极端信号的邮件通知
title: "订阅邮件通知"
labels: ["subscription"]
body:
  - type: markdown
    attributes:
      value: |
        ## 订阅邮件通知

        当检测到品种对比值/差值出现极端信号（超过 1% 或 99% 分位）时，我们会通过邮件通知您。

        请在下方输入您的邮箱地址：
  - type: input
    id: email
    attributes:
      label: 邮箱地址
      description: 用于接收套利指标极端信号通知
      placeholder: "your@email.com"
    validations:
      required: true
