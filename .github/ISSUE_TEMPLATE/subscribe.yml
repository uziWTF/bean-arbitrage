name: 订阅飞书通知
description: 订阅套利指标极端信号的飞书机器人通知
title: "订阅飞书通知"
labels: ["subscription"]
body:
  - type: markdown
    attributes:
      value: |
        ## 订阅飞书机器人通知

        当检测到品种对比值/差值出现极端信号（超过 1% 或 99% 分位）时，我们会通过飞书机器人通知您。

        ### 如何获取 Webhook URL
        1. 在飞书中创建一个群聊（或使用已有群聊）
        2. 点击群聊设置 → 群机器人 → 添加机器人 → 自定义机器人
        3. 复制生成的 Webhook URL

        请在下方粘贴您的飞书机器人 Webhook URL：
  - type: input
    id: webhook_url
    attributes:
      label: 飞书机器人 Webhook URL
      description: 用于接收套利指标极端信号通知
      placeholder: "https://open.feishu.cn/open-apis/bot/v2/hook/xxxxx"
    validations:
      required: true
