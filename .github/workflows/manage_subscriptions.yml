name: Manage Feishu Subscriptions

on:
  issues:
    types: [opened]

jobs:
  process-subscription:
    if: contains(github.event.issue.title, '订阅飞书通知:') || contains(github.event.issue.title, '取消订阅:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process subscription
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const issue = context.payload.issue;
            const title = issue.title;

            const subscribersPath = path.join('githubaction', 'data', 'subscribers.json');
            let subscribers = { subscribers: [] };
            try {
              const data = fs.readFileSync(subscribersPath, 'utf8');
              subscribers = JSON.parse(data);
            } catch (e) {
              console.log('订阅者文件不存在，将创建新文件');
            }

            // 从标题中提取 webhook URL: "订阅飞书通知: https://open.feishu.cn/..."
            const webhookMatch = title.match(/[:：]\s*(.+)/);
            if (!webhookMatch) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ 未找到有效的飞书机器人 Webhook URL。'
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              return;
            }

            const webhookUrl = webhookMatch[1].trim();

            // 简单校验 URL 格式
            if (!webhookUrl.startsWith('https://open.feishu.cn/open-apis/bot/v2/hook/')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ Webhook URL 格式不正确。应以 `https://open.feishu.cn/open-apis/bot/v2/hook/` 开头。'
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              return;
            }

            if (title.includes('取消订阅')) {
              const idx = subscribers.subscribers.findIndex(s => s.webhook_url === webhookUrl);
              if (idx >= 0) {
                subscribers.subscribers[idx].active = false;
                fs.writeFileSync(subscribersPath, JSON.stringify(subscribers, null, 2), 'utf8');
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: '✅ 已成功取消订阅。'
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: '❌ 未找到该 Webhook URL 的订阅记录。'
                });
              }
            } else {
              const existing = subscribers.subscribers.find(s => s.webhook_url === webhookUrl);
              if (existing) {
                existing.active = true;
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: '✅ 已重新激活订阅。'
                });
              } else {
                subscribers.subscribers.push({
                  name: '',
                  webhook_url: webhookUrl,
                  added_date: new Date().toISOString().split('T')[0],
                  active: true
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: '✅ 订阅成功！\n\n当检测到极端信号时，您将收到飞书机器人通知。'
                });
              }
              fs.writeFileSync(subscribersPath, JSON.stringify(subscribers, null, 2), 'utf8');
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed'
            });

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add githubaction/data/subscribers.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update subscribers list"
            git push
          fi
