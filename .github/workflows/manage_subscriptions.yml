name: Manage Email Subscriptions

on:
  issues:
    types: [opened]

jobs:
  process-subscription:
    if: contains(github.event.issue.title, '订阅邮件通知:') || contains(github.event.issue.title, '取消订阅:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process subscription
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const issue = context.payload.issue;
            const title = issue.title;

            const subscribersPath = path.join('githubaction', 'data', 'subscribers.json');
            let subscribers = { subscribers: [] };
            try {
              const data = fs.readFileSync(subscribersPath, 'utf8');
              subscribers = JSON.parse(data);
            } catch (e) {
              console.log('订阅者文件不存在，将创建新文件');
            }

            // 从标题中提取邮箱: "订阅邮件通知: xxx@xxx.com" 或 "取消订阅: xxx@xxx.com"
            const emailMatch = title.match(/[:：]\s*(.+)/);
            if (!emailMatch) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '❌ 未找到有效的邮箱地址。'
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              return;
            }

            const email = emailMatch[1].trim();

            if (title.includes('取消订阅')) {
              const idx = subscribers.subscribers.findIndex(s => s.email === email);
              if (idx >= 0) {
                subscribers.subscribers[idx].active = false;
                fs.writeFileSync(subscribersPath, JSON.stringify(subscribers, null, 2), 'utf8');
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ 已成功取消订阅：${email}`
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `❌ 未找到邮箱 ${email} 的订阅记录。`
                });
              }
            } else {
              const existing = subscribers.subscribers.find(s => s.email === email);
              if (existing) {
                existing.active = true;
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ 已重新激活订阅：${email}`
                });
              } else {
                subscribers.subscribers.push({
                  email: email,
                  added_date: new Date().toISOString().split('T')[0],
                  active: true
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ 订阅成功！邮箱：${email}\n\n当检测到极端信号时，您将收到邮件通知。`
                });
              }
              fs.writeFileSync(subscribersPath, JSON.stringify(subscribers, null, 2), 'utf8');
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed'
            });

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add githubaction/data/subscribers.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update subscribers list"
            git push
          fi
