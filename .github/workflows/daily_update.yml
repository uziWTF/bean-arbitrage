name: Daily Update and Deploy

on:
  schedule:
    # 交易日北京时间 08:30：更新网页最新数据，触发信号则发飞书
    - cron: '30 0 * * 1-5'
    # 交易日北京时间 12:00：更新网页最新数据，触发信号则发飞书
    - cron: '0 4 * * 1-5'
    # 交易日北京时间 15:30：保存收盘数据，更新历史曲线，触发信号则发飞书
    - cron: '30 7 * * 1-5'
  workflow_dispatch: # Manual trigger

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'githubaction/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r githubaction/requirements.txt

      - name: Scrape latest prices
        run: python githubaction/scrape_prices.py

      - name: Calculate metrics
        env:
          SAVE_HISTORY: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '30 7 * * 1-5' }}
        run: python githubaction/calculate_metrics.py

      - name: Generate HTML site
        run: python githubaction/generate_html.py

      - name: Commit updated data back to repo
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add githubaction/data/pairs_data.json githubaction/data/commodities.json
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "auto: update closing data $(date +%Y-%m-%d)"
            git push
          fi

      - name: Send Feishu alerts
        if: hashFiles('githubaction/data/alerts.json') != ''
        env:
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          DASHBOARD_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: python githubaction/send_alerts.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          commit_message: 'auto: daily update ${{ github.event.schedule }}'
