name: Daily Update and Deploy

on:
  schedule:
    # 每周一到周五 15:30 UTC = 北京时间 23:30（收盘后）
    - cron: '30 15 * * 1-5'
  workflow_dispatch: # 手动触发

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'githubaction/requirements.txt'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python dependencies
        run: pip install -r githubaction/requirements.txt

      - name: Scrape latest prices
        run: python githubaction/scrape_prices.py

      - name: Calculate metrics
        run: python githubaction/calculate_metrics.py

      - name: Generate HTML site
        run: python githubaction/generate_html.py

      - name: Send email alerts
        if: hashFiles('githubaction/data/alerts.json') != ''
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_SENDER_EMAIL: ${{ secrets.ALERT_SENDER_EMAIL }}
          ALERT_SENDER_NAME: ${{ secrets.ALERT_SENDER_NAME }}
          DASHBOARD_URL: ${{ github.server_url }}/${{ github.repository }}
        run: python githubaction/send_alerts.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          commit_message: 'auto: daily update ${{ github.event.schedule }}'
